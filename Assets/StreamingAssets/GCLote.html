<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Darumadrop+One&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    color: white;

    margin: 0;
    height: 100vh;

    display: flex;
    align-items: flex-end;
    justify-content: center;
}

.GC{
    position: absolute;
    top: 10px;

    width: 1920px;
    height: 300px;
}

#LoteID {
    position: relative;
    top: 10px;

    color: #ffffff;
    font-size: 70px;
    padding: 10px;
    text-align: center;
}

#LoteName {
    display: inline-block;
    text-transform: uppercase;
    position: absolute;
    top: 200px;
    left: 10px;

    color: #f1f713;
    font-size: 60px;
    padding: 10px;
}

#LanceTXT {
    position: absolute;
    top: 10px;
    right: 10px;

    color: #f1f713;
    font-size: 100px;
    padding: 10px;

    text-align: right;

    display: inline-block;        /* 🔥 importante */
    transform-origin: center;     /* 🔥 animação suave */
}

.centavos {
    font-size: 70px;
}

/* 🔥 animação */
@keyframes destaqueLance {
    0%   { transform: scale(1); color: white; }
    50%  { transform: scale(1.2); color: lime; }
    100% { transform: scale(1); color: #f1f713; }
}

.animar {
    animation: destaqueLance 0.3s ease;
}

.BottomInfo {
    position: absolute;
    top: 90%;
    left: 50%;
    transform: translate(-50%, -50%);

    text-transform: uppercase;

    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;

    color: #354355;
    width: 1920px;
    font-size: 20px;

    padding: 10px 20px;
}

.item {
    display: flex;
    align-items: center;
}

.sep {
    transform: scale(2.0);
    color: #354355;
    margin: 0 10px;
    font-size: 15px;
}
</style>
</head>

<body>

<div class="GC">
    <div id="LoteID"></div>
    <div id="LoteName"></div>
    <div id="LanceTXT"></div>
</div>

<div class="BottomInfo"></div>

<script>
let ultimoLance = null;

function atualizarLance(Lance) {
    const el = document.getElementById("LanceTXT");

    if (!Lance || Lance.trim() === "") {
        el.innerHTML = "";
        ultimoLance = null;
        return;
    }

    el.innerHTML = `${Lance}<span class="centavos">,00</span>`;

    if (ultimoLance !== Lance) {
        el.classList.remove("animar");
        void el.offsetWidth; // reset animação
        el.classList.add("animar");
    }

    ultimoLance = Lance;
}

async function atualizar() {

    const dataResponse = await fetch("GCLote.json?t=" + Date.now());
    const data = await dataResponse.json();

    const LanceResponse = await fetch("LanceAtual.txt?t=" + Date.now());
    const Lance = await LanceResponse.text();

    document.getElementById("LoteID").innerHTML = "LOTE:<br>" + data.loteID;
    document.getElementById("LoteName").innerHTML = "NOME: " + data.nome;

    // 🔥 AGORA USANDO A FUNÇÃO CORRETA
    atualizarLance(Lance);

    const styleResponse = await fetch("GCStyle.json?t=" + Date.now());
    const style = await styleResponse.json();

    const container = document.querySelector(".BottomInfo");

    const itens = [
        data.idade,
        data.sexo,
        data.peso,
        data.sangue,
        data.nascimento,
        data.ultimoParto,
        data.prevParto,
        data.producao,
        data.mae,
        data.pai,
        data.infoExtras
    ].filter(v => v && v.trim() !== "");

    container.innerHTML = "";

    itens.forEach((texto, index) => {

        if (index > 0) {
            const sep = document.createElement("span");
            sep.className = "sep";
            sep.innerText = style.separator || "•";
            container.appendChild(sep);
        }

        const div = document.createElement("div");
        div.className = "item";
        div.innerText = texto;

        div.style.backgroundColor = style.boxColor;
        div.style.borderRadius = style.borderRadius + "px";
        div.style.padding = style.paddingY + "px " + style.paddingX + "px";

        container.appendChild(div);
    });

    document.querySelectorAll(".sep").forEach(sep => {
        sep.style.fontSize = style.sepSize + "px";
    });

    container.style.fontSize = style.fontSize + "px";
    container.style.opacity = style.opacity;
    container.style.width = style.GCwidth + "px";
}

// 🔥 pode ajustar se quiser mais suave
setInterval(atualizar, 300);
</script>

</body>
</html>
